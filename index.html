<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ovOne v2</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #dceef8;
        color: #1f2528;
      }

      button,
      input {
        font: inherit;
      }

      select {
        font: inherit;
      }

      .mvp-splash {
        min-height: 100vh;
        display: grid;
        padding: 0;
        box-sizing: border-box;
        text-align: center;
        background: #dceef8;
        cursor: pointer;
      }

      .mvp-splash-shell {
        width: 100%;
        cursor: pointer;
      }

      .mvp-splash-viewport {
        min-height: 100vh;
        display: grid;
        position: relative;
        grid-template-rows: 1fr auto 32px auto 1fr;
        align-items: center;
        justify-items: center;
        box-sizing: border-box;
        padding: 14px 16px;
        background: #fffaf0;
      }

      .mvp-splash-brush {
        position: relative;
        width: 158px;
        height: 118px;
        display: grid;
        grid-row: 2;
        grid-column: 1;
        clip-path: polygon(12% 38%, 26% 20%, 45% 11%, 58% 18%, 74% 13%, 83% 28%, 91% 46%, 86% 66%, 73% 78%, 56% 91%, 39% 82%, 22% 88%, 13% 70%, 5% 56%);
        border-radius: 42% 58% 45% 55% / 53% 43% 57% 47%;
        background:
          linear-gradient(155deg, rgba(219, 251, 249, 0) 0 15%, rgba(207, 245, 244, 0.68) 16% 38%, rgba(216, 250, 249, 0.46) 39% 54%, rgba(202, 241, 241, 0.64) 55% 76%, rgba(219, 251, 249, 0) 77%),
          radial-gradient(circle at 34% 36%, rgba(219, 252, 249, 0.78), rgba(202, 242, 242, 0.55) 48%, rgba(207, 245, 244, 0.28) 76%);
        filter: blur(0.1px);
        opacity: 0.92;
        transform: rotate(-10deg);
      }

      .mvp-splash-brush::before,
      .mvp-splash-brush::after {
        position: absolute;
        content: "";
        background: inherit;
      }

      .mvp-splash-brush::before {
        width: 132px;
        height: 42px;
        left: -3px;
        top: 27px;
        clip-path: polygon(0 42%, 19% 20%, 43% 13%, 70% 21%, 100% 9%, 92% 61%, 68% 76%, 39% 69%, 17% 89%);
        border-radius: 56% 44% 62% 38% / 52% 46% 54% 48%;
        opacity: 0.64;
        transform: rotate(-21deg);
      }

      .mvp-splash-brush::after {
        width: 118px;
        height: 46px;
        right: -5px;
        bottom: 21px;
        clip-path: polygon(4% 25%, 28% 8%, 51% 20%, 76% 4%, 100% 31%, 88% 70%, 62% 64%, 37% 87%, 10% 73%);
        border-radius: 42% 58% 44% 56% / 48% 55% 45% 52%;
        opacity: 0.58;
        transform: rotate(18deg);
      }

      .mvp-splash-logo {
        position: relative;
        z-index: 1;
        grid-row: 2;
        grid-column: 1;
        display: inline-flex;
        align-items: center;
        gap: 0.17em;
        color: #101314;
        font-family: "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive;
        font-size: 2.28rem;
        font-weight: 700;
        letter-spacing: 0;
        align-self: center;
        justify-self: center;
      }

      .mvp-splash-logo-letter {
        display: inline-block;
        line-height: 1;
      }

      .mvp-splash-logo-small-o {
        position: relative;
        width: 0.54em;
        height: 0.62em;
        color: transparent;
        font-weight: 900;
        transform: rotate(-8deg) translateY(1px);
      }

      .mvp-splash-logo-v {
        transform: rotate(4deg) translateY(2px);
      }

      .mvp-splash-logo-big-o {
        position: relative;
        width: 0.64em;
        height: 0.72em;
        color: transparent;
        font-weight: 800;
        transform: rotate(-3deg);
      }

      .mvp-splash-logo-small-o::before,
      .mvp-splash-logo-big-o::before {
        position: absolute;
        content: "";
        display: block;
        background: #101314;
        box-shadow: 0.012em 0.018em 0 rgba(16, 19, 20, 0.22);
      }

      .mvp-splash-logo-small-o::before {
        width: 0.38em;
        height: 0.42em;
        left: 0.09em;
        top: 0.17em;
        border-radius: 58% 42% 55% 45% / 46% 54% 43% 57%;
        transform: rotate(13deg);
      }

      .mvp-splash-logo-big-o::before {
        width: 0.54em;
        height: 0.64em;
        left: 0.05em;
        top: 0.04em;
        border-radius: 47% 53% 43% 57% / 55% 45% 58% 42%;
        transform: rotate(-5deg);
      }

      .mvp-splash-mark {
        margin: 0;
        color: #384243;
        font-family: "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive;
        font-size: 0.92rem;
        font-weight: 600;
        grid-row: 4;
        grid-column: 1;
      }

      .mvp-trial-entry {
        min-height: 100vh;
        display: grid;
        place-content: center;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
        background: #faf9f4;
      }

      .mvp-trial-entry-card {
        width: min(82vw, 330px);
        display: grid;
        justify-items: center;
        gap: 18px;
        padding: 36px 28px 32px;
        box-sizing: border-box;
        border: 1px solid rgba(153, 177, 181, 0.22);
        border-radius: 28px;
        background: rgba(255, 254, 250, 0.9);
        box-shadow: 0 18px 44px rgba(78, 100, 108, 0.08);
      }

      .mvp-trial-entry-brand {
        display: inline-grid;
        place-items: center;
        min-width: 78px;
        min-height: 42px;
        border-radius: 999px;
        background: rgba(204, 242, 242, 0.68);
        color: #1d3034;
        font-family: "Comic Sans MS", "Segoe Print", "Bradley Hand ITC", cursive;
        font-size: 1.16rem;
        font-weight: 700;
      }

      .mvp-trial-entry h1 {
        margin: 0;
        color: #1f292b;
        font-size: 1.5rem;
        letter-spacing: 0;
      }

      .mvp-trial-entry p {
        margin: 0;
        max-width: 240px;
        color: #657170;
        font-size: 0.94rem;
        line-height: 1.7;
      }

      .mvp-trial-entry-button {
        min-height: 44px;
        border: 1px solid rgba(132, 185, 196, 0.46);
        border-radius: 999px;
        padding: 10px 24px;
        background: #d9f2f4;
        color: #1e373d;
        cursor: pointer;
        font-weight: 700;
        box-shadow: 0 10px 24px rgba(73, 126, 138, 0.12);
      }

      .mvp-shell {
        min-height: 100vh;
        max-width: 430px;
        margin: 0 auto;
        border-right: 1px solid rgba(93, 129, 144, 0.18);
        border-left: 1px solid rgba(93, 129, 144, 0.18);
        background: #fffaf0;
        box-shadow: 0 18px 70px rgba(70, 116, 139, 0.22);
      }

      .mvp-viewport {
        min-height: 100vh;
        padding: 14px 16px 86px;
        box-sizing: border-box;
        background: #fffaf0;
      }

      .mvp-page {
        min-height: calc(100vh - 100px);
      }

      .mvp-page > .mvp-screen {
        min-height: inherit;
      }

      .mvp-screen {
        min-height: calc(100vh - 100px);
      }

      .mvp-header {
        min-height: 44px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .mvp-home-header {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) 44px;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
      }

      .mvp-home-brand {
        grid-column: 2;
        justify-self: center;
        display: inline-grid;
        justify-items: center;
        align-items: center;
        gap: 3px;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }

      .mvp-home-brand h1 {
        margin: 0;
        font-size: 1.72rem;
        letter-spacing: 0;
      }

      .mvp-home-wordmark {
        position: relative;
        display: inline-block;
        line-height: 1;
      }

      .mvp-notification-dot {
        position: absolute;
        top: 1px;
        right: -9px;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #d94b3d;
      }

      .mvp-world-linked-count {
        max-width: 180px;
        overflow: hidden;
        color: #6a746f;
        font-size: 0.78rem;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mvp-add-button {
        grid-column: 3;
        width: 38px;
        height: 38px;
        border: 1px solid #cfe1ea;
        border-radius: 999px;
        background: #eef7fb;
        color: #1f2528;
        cursor: pointer;
        font-size: 1.15rem;
      }

      .mvp-header h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      .mvp-bottom-nav {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        max-width: 430px;
        margin: 0 auto;
        padding: 8px 14px 12px;
        box-sizing: border-box;
        border-top: 1px solid #e2e5e0;
        background: rgba(255, 250, 240, 0.96);
        backdrop-filter: blur(14px);
      }

      .mvp-overlay-layer {
        position: fixed;
        right: 0;
        bottom: 124px;
        left: 0;
        z-index: 7;
        max-width: 430px;
        margin: 0 auto;
        padding: 0 16px;
        box-sizing: border-box;
        pointer-events: none;
      }

      .mvp-overlay-layer:empty {
        display: none;
      }

      .mvp-overlay-panel {
        display: grid;
        gap: 8px;
        max-height: min(42vh, 360px);
        overflow-y: auto;
        padding: 10px;
        border: 1px solid #e2e5e0;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 12px 30px rgba(31, 37, 40, 0.12);
        pointer-events: auto;
      }

      .mvp-world-creation-transition-layer {
        position: fixed;
        right: 0;
        top: 86px;
        left: 0;
        z-index: 8;
        max-width: 430px;
        margin: 0 auto;
        padding: 0 18px;
        box-sizing: border-box;
        pointer-events: none;
      }

      .mvp-world-creation-transition-layer:empty {
        display: none;
      }

      .mvp-world-creation-transition {
        display: grid;
        gap: 6px;
        padding: 14px;
        border: 1px solid #e2e5e0;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 12px 30px rgba(31, 37, 40, 0.12);
        pointer-events: auto;
      }

      .mvp-world-creation-transition p,
      .mvp-world-creation-transition strong {
        margin: 0;
      }

      .mvp-world-creation-transition button {
        justify-self: end;
        border: 0;
        border-radius: 999px;
        padding: 7px 14px;
        background: #111;
        color: #fff;
      }

      .mvp-add-menu,
      .mvp-chat-menu,
      .mvp-ovo-control,
      .mvp-ovo-world-menu,
      .mvp-file-picker {
        justify-self: end;
        width: min(220px, 100%);
      }

      .mvp-ovo-control,
      .mvp-ovo-world-menu {
        justify-self: center;
      }

      .mvp-create-world-draft {
        display: grid;
        align-content: start;
        gap: 14px;
        padding-bottom: 12px;
      }

      .mvp-create-world-draft input,
      .mvp-create-world-draft textarea,
      .mvp-create-world-detail-edit input,
      .mvp-create-world-detail-edit textarea,
      .mvp-world-editor input,
      .mvp-world-editor textarea {
        min-height: 40px;
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #d8ddd9;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }

      .mvp-create-world-draft textarea {
        min-height: 88px;
        resize: vertical;
      }

      .mvp-create-world-draft input.is-invalid,
      .mvp-create-world-detail-edit input.is-invalid {
        border-color: #d3382f;
        box-shadow: 0 0 0 2px rgba(211, 56, 47, 0.12);
      }

      .mvp-create-world-detail-edit textarea,
      .mvp-world-editor textarea {
        min-height: 96px;
        resize: vertical;
      }

      .mvp-world-editor {
        display: grid;
        align-content: start;
        gap: 14px;
      }

      .mvp-create-world-stage,
      .mvp-create-world-field,
      .mvp-create-world-worldview-block,
      .mvp-create-world-section,
      .mvp-create-world-actions,
      .mvp-create-world-detail-section,
      .mvp-world-editor-section,
      .mvp-world-editor-actions,
      .mvp-create-world-fixed-roles,
      .mvp-create-world-fixed-role-row,
      .mvp-create-world-random-roles,
      .mvp-create-world-random-role-row {
        display: grid;
        gap: 6px;
      }

      .mvp-create-world-stage h2 {
        margin: 0;
        font-size: 0.95rem;
      }

      .mvp-create-world-validation {
        margin: 0;
        color: #d3382f;
        font-size: 0.86rem;
      }

      .mvp-create-world-source-controls,
      .mvp-create-world-official-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .mvp-create-world-source-controls button,
      .mvp-create-world-chip {
        min-height: 34px;
        padding: 0 10px;
        border: 1px solid #d8ddd9;
        border-radius: 999px;
        background: #ffffff;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-create-world-chip {
        font-size: 0.9rem;
      }

      .mvp-create-world-detail-edit {
        display: grid;
        align-content: start;
        gap: 14px;
      }

      .mvp-create-world-detail-placeholder {
        display: grid;
        gap: 8px;
        padding: 14px;
        border: 1px solid #e2e5e0;
        border-radius: 10px;
        background: #ffffff;
      }

      .mvp-create-world-fixed-role-row,
      .mvp-create-world-random-role-row {
        padding: 10px;
        border: 1px solid #e2e5e0;
        border-radius: 10px;
        background: #ffffff;
      }

      .mvp-create-world-role-checkbox {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #4f5d58;
        font-size: 0.92rem;
      }

      .mvp-create-world-role-checkbox input {
        width: auto;
        min-height: auto;
      }

      .mvp-ovo-world-list {
        display: grid;
        gap: 6px;
      }

      .mvp-ovo-world-row.is-current {
        border-color: #d3382f;
        color: #d3382f;
        font-weight: 700;
      }

      .mvp-emoji-picker {
        grid-auto-flow: column;
        justify-content: start;
        width: max-content;
        max-width: 100%;
      }

      .mvp-overlay-panel button {
        min-height: 40px;
        border: 1px solid #d8ddd9;
        border-radius: 8px;
        background: #ffffff;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-nav-item {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #69736e;
        cursor: pointer;
      }

      .mvp-nav-item.is-active {
        color: #1f2528;
        font-weight: 700;
      }

      .mvp-chat-list,
      .mvp-contact-list,
      .mvp-connected-list {
        display: grid;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .mvp-chat-list {
        gap: 0;
        overflow: hidden;
        border: 1px solid rgba(190, 215, 226, 0.65);
        border-radius: 20px;
        background: #fffdf7;
      }

      .mvp-chat-list li + li {
        border-top: 1px solid #e3eef3;
      }

      .mvp-ovo-indicator {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin: 0 0 12px;
        padding: 8px 10px;
        border-radius: 999px;
        background: #eef4f1;
        color: #26322e;
        font-size: 0.92rem;
      }

      .mvp-chat-row,
      .mvp-contact-row {
        width: 100%;
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 12px 2px;
        border: 0;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .mvp-contact-row {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .mvp-avatar {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        background: #e8f4f9;
        color: #26322e;
        font-weight: 800;
      }

      .mvp-avatar-wrap {
        position: relative;
        display: inline-grid;
        width: 44px;
        height: 44px;
        place-items: center;
      }

      .mvp-avatar-wrap .mvp-presence-dot {
        position: absolute;
        right: 1px;
        bottom: 1px;
        border: 2px solid #fbfbf8;
      }

      .mvp-chat-copy {
        min-width: 0;
        display: grid;
        gap: 5px;
      }

      .mvp-chat-kind {
        justify-self: start;
        border-radius: 999px;
        padding: 2px 7px;
        background: #eef4f1;
        color: #4f7d72;
        font-size: 0.72rem;
        font-style: normal;
        font-weight: 700;
      }

      .mvp-relationship-copy {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .mvp-chat-copy strong,
      .mvp-chat-copy span,
      .mvp-relationship-copy strong,
      .mvp-relationship-copy span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mvp-chat-subtitle {
        color: #687982;
        font-size: 0.84rem;
      }

      .mvp-chat-copy span,
      .mvp-relationship-copy span {
        color: #68736f;
        font-size: 0.9rem;
      }

      .mvp-empty-state,
      .mvp-message-empty {
        margin: 16px 0;
        padding: 12px;
        border: 1px solid #e2e5e0;
        border-radius: 10px;
        background: #ffffff;
        color: #68736f;
        line-height: 1.45;
      }

      .mvp-avatar.is-system {
        background: #1f2528;
        color: #ffffff;
      }

      .mvp-name-block {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .mvp-name-block strong,
      .mvp-name-block span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mvp-name-block span {
        color: #68736f;
        font-size: 0.9rem;
      }

      .mvp-presence-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #b9c0bc;
      }

      .mvp-presence-dot.is-online {
        background: #4f7d72;
      }

      .mvp-chat-meta {
        display: grid;
        justify-items: end;
        gap: 5px;
        color: #8a938f;
        font-size: 0.8rem;
      }

      .mvp-chat-meta strong {
        min-width: 18px;
        height: 18px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #d94b3d;
        color: #ffffff;
        font-size: 0.75rem;
      }

      .mvp-chat-view {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: calc(100vh - 16px);
        padding-bottom: 86px;
      }

      .mvp-chat-page-header {
        min-height: 48px;
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr) 42px;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .mvp-back-button {
        min-height: 34px;
        border: 0;
        background: transparent;
        color: #4f7d72;
        cursor: pointer;
      }

      .mvp-chat-title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        justify-self: center;
      }

      .mvp-chat-menu-button {
        width: 40px;
        height: 40px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-message-stream {
        display: grid;
        grid-auto-flow: row;
        align-content: end;
        gap: 8px;
        margin: 0;
        padding: 8px 0 22px;
        overflow-y: auto;
        overscroll-behavior: contain;
        list-style: none;
      }

      .mvp-message-row {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        align-items: end;
        gap: 8px;
      }

      .mvp-message-row.is-mine {
        grid-template-columns: minmax(0, 1fr) 44px;
      }

      .mvp-message {
        max-width: 78%;
        justify-self: start;
        margin: 0;
        padding: 9px 11px;
        border-radius: 14px;
        background: #ffffff;
        line-height: 1.42;
      }

      .mvp-message-block {
        min-width: 0;
        display: grid;
        gap: 4px;
        justify-items: start;
      }

      .mvp-message-speaker {
        color: #68736f;
        font-size: 0.78rem;
      }

      .mvp-message.is-error {
        border: 1px solid #f1c6c1;
        background: #fff6f4;
        color: #9b3d35;
      }

      .mvp-message.is-loading {
        color: #68736f;
        font-style: italic;
      }

      .mvp-message-row.is-mine .mvp-message {
        justify-self: end;
        background: #dcebe5;
      }

      .mvp-message-row.is-mine .mvp-message-block {
        justify-items: end;
      }

      .mvp-composer {
        position: fixed;
        right: 0;
