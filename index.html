<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ovOne v2</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #fbfbf8;
        color: #1f2528;
      }

      button,
      input {
        font: inherit;
      }

      select {
        font: inherit;
      }

      .mvp-splash {
        min-height: 100vh;
        display: grid;
        place-content: center;
        gap: 8px;
        padding: 24px;
        text-align: center;
        background: #fbfbf8;
      }

      .mvp-splash h1 {
        margin: 0 0 10px;
        font-size: 2.2rem;
      }

      .mvp-splash p {
        margin: 0;
        color: #4f5d58;
        font-size: 1rem;
      }

      .mvp-shell {
        min-height: 100vh;
        max-width: 480px;
        margin: 0 auto;
        background: #fbfbf8;
      }

      .mvp-viewport {
        min-height: 100vh;
        padding: 14px 16px 86px;
        box-sizing: border-box;
      }

      .mvp-page {
        min-height: calc(100vh - 100px);
      }

      .mvp-page > .mvp-screen {
        min-height: inherit;
      }

      .mvp-screen {
        min-height: calc(100vh - 100px);
      }

      .mvp-header {
        min-height: 44px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .mvp-home-header {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) 42px;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      .mvp-home-brand {
        grid-column: 2;
        justify-self: center;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }

      .mvp-home-brand h1 {
        margin: 0;
        font-size: 1.55rem;
      }

      .mvp-notification-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #d94b3d;
      }

      .mvp-add-button {
        grid-column: 3;
        width: 40px;
        height: 40px;
        border: 1px solid #d8ddd9;
        border-radius: 999px;
        background: #ffffff;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-header h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      .mvp-bottom-nav {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        max-width: 480px;
        margin: 0 auto;
        padding: 8px 14px 12px;
        box-sizing: border-box;
        border-top: 1px solid #e2e5e0;
        background: rgba(251, 251, 248, 0.96);
        backdrop-filter: blur(14px);
      }

      .mvp-overlay-layer {
        position: fixed;
        right: 0;
        bottom: 124px;
        left: 0;
        z-index: 7;
        max-width: 480px;
        margin: 0 auto;
        padding: 0 16px;
        box-sizing: border-box;
        pointer-events: none;
      }

      .mvp-overlay-layer:empty {
        display: none;
      }

      .mvp-overlay-panel {
        display: grid;
        gap: 8px;
        max-height: min(42vh, 360px);
        overflow-y: auto;
        padding: 10px;
        border: 1px solid #e2e5e0;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 12px 30px rgba(31, 37, 40, 0.12);
        pointer-events: auto;
      }

      .mvp-add-menu,
      .mvp-chat-menu,
      .mvp-ovo-control,
      .mvp-file-picker {
        justify-self: end;
        width: min(220px, 100%);
      }

      .mvp-ovo-control {
        justify-self: center;
      }

      .mvp-emoji-picker {
        grid-auto-flow: column;
        justify-content: start;
        width: max-content;
        max-width: 100%;
      }

      .mvp-overlay-panel button {
        min-height: 40px;
        border: 1px solid #d8ddd9;
        border-radius: 8px;
        background: #ffffff;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-nav-item {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #69736e;
        cursor: pointer;
      }

      .mvp-nav-item.is-active {
        color: #1f2528;
        font-weight: 700;
      }

      .mvp-chat-list,
      .mvp-contact-list,
      .mvp-connected-list {
        display: grid;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .mvp-ovo-indicator {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin: 0 0 12px;
        padding: 8px 10px;
        border-radius: 999px;
        background: #eef4f1;
        color: #26322e;
        font-size: 0.92rem;
      }

      .mvp-chat-row,
      .mvp-contact-row {
        width: 100%;
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border: 0;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .mvp-contact-row {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .mvp-avatar {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: #e8f0ed;
        color: #26322e;
        font-weight: 800;
      }

      .mvp-avatar-wrap {
        position: relative;
        display: inline-grid;
        width: 44px;
        height: 44px;
        place-items: center;
      }

      .mvp-avatar-wrap .mvp-presence-dot {
        position: absolute;
        right: 1px;
        bottom: 1px;
        border: 2px solid #fbfbf8;
      }

      .mvp-chat-copy {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .mvp-relationship-copy {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .mvp-chat-copy strong,
      .mvp-chat-copy span,
      .mvp-relationship-copy strong,
      .mvp-relationship-copy span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mvp-chat-copy span,
      .mvp-relationship-copy span {
        color: #68736f;
        font-size: 0.9rem;
      }

      .mvp-avatar.is-system {
        background: #1f2528;
        color: #ffffff;
      }

      .mvp-name-block {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .mvp-name-block strong,
      .mvp-name-block span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mvp-name-block span {
        color: #68736f;
        font-size: 0.9rem;
      }

      .mvp-presence-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #b9c0bc;
      }

      .mvp-presence-dot.is-online {
        background: #4f7d72;
      }

      .mvp-chat-meta {
        display: grid;
        justify-items: end;
        gap: 5px;
        color: #8a938f;
        font-size: 0.8rem;
      }

      .mvp-chat-meta strong {
        min-width: 18px;
        height: 18px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #d94b3d;
        color: #ffffff;
        font-size: 0.75rem;
      }

      .mvp-chat-view {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: calc(100vh - 16px);
        padding-bottom: 86px;
      }

      .mvp-chat-page-header {
        min-height: 48px;
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr) 42px;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .mvp-back-button {
        min-height: 34px;
        border: 0;
        background: transparent;
        color: #4f7d72;
        cursor: pointer;
      }

      .mvp-chat-title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        justify-self: center;
      }

      .mvp-chat-menu-button {
        width: 40px;
        height: 40px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-message-stream {
        display: grid;
        grid-auto-flow: row;
        align-content: end;
        gap: 8px;
        margin: 0;
        padding: 8px 0 22px;
        overflow-y: auto;
        overscroll-behavior: contain;
        list-style: none;
      }

      .mvp-message-row {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        align-items: end;
        gap: 8px;
      }

      .mvp-message-row.is-mine {
        grid-template-columns: minmax(0, 1fr) 44px;
      }

      .mvp-message {
        max-width: 78%;
        justify-self: start;
        margin: 0;
        padding: 9px 11px;
        border-radius: 14px;
        background: #ffffff;
        line-height: 1.42;
      }

      .mvp-message-row.is-mine .mvp-message {
        justify-self: end;
        background: #dcebe5;
      }

      .mvp-composer {
        position: fixed;
        right: 0;
        bottom: 64px;
        left: 0;
        z-index: 6;
        max-width: 480px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px 10px;
        box-sizing: border-box;
        background: rgba(251, 251, 248, 0.96);
        backdrop-filter: blur(14px);
      }

      .mvp-composer input {
        flex: 1;
        min-width: 0;
        min-height: 42px;
        padding: 0 13px;
        border: 1px solid #d8ddd9;
        border-radius: 999px;
        background: #ffffff;
      }

      .mvp-composer button,
      .mvp-inline-action {
        min-height: 42px;
        padding: 0 14px;
        border: 1px solid #d8ddd9;
        border-radius: 999px;
        background: #ffffff;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-inline-action {
        width: 42px;
        padding: 0;
      }

      .mvp-me-list,
      .mvp-settings-panel {
        display: grid;
        gap: 12px;
      }

      .mvp-profile-header {
        display: grid;
        grid-template-columns: 58px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        padding: 14px 0 18px;
      }

      .mvp-profile-avatar {
        width: 56px;
        height: 56px;
        border: 0;
        border-radius: 18px;
        background: #1f2528;
        color: #ffffff;
        font-weight: 800;
        cursor: pointer;
      }

      .mvp-profile-account {
        min-width: 0;
        display: grid;
        justify-items: end;
        gap: 5px;
      }

      .mvp-profile-user-id,
      .mvp-profile-binding {
        max-width: 100%;
        border: 0;
        background: transparent;
        color: #1f2528;
        text-align: right;
        cursor: pointer;
      }

      .mvp-profile-binding {
        color: #68736f;
        font-size: 0.9rem;
      }

      .mvp-feature-menu {
        display: grid;
        gap: 0;
        border-top: 1px solid #eef0ec;
      }

      .mvp-feature-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        padding: 12px 0;
        border: 0;
        border-bottom: 1px solid #eef0ec;
        background: transparent;
        color: inherit;
        text-align: left;
      }

      .mvp-feature-row span {
        color: #1f2528;
      }

      .mvp-feature-row strong {
        color: #68736f;
        font-weight: 500;
        text-align: right;
      }

      .mvp-feature-button {
        width: 100%;
        cursor: pointer;
      }

      .mvp-connected-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid #eef0ec;
      }

      .mvp-danger-light,
      .mvp-settings-button,
      .mvp-connected-list button {
        min-height: 42px;
        border: 1px solid #d8ddd9;
        border-radius: 8px;
        background: #ffffff;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-danger-light {
        color: #9b3d35;
      }

      .mvp-connected-list button:disabled {
        color: #9aa19d;
        cursor: default;
      }

      .mvp-rule-note,
      .mvp-language-panel p {
        margin: 0;
        color: #68736f;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .mvp-language-panel {
        display: grid;
        gap: 6px;
        padding-top: 8px;
      }

      .mvp-language-panel h2 {
        margin: 0;
        font-size: 1rem;
      }

    </style>
  </head>
  <body>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
