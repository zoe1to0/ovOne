<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ovOne v2</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #dceef8;
        color: #1f2528;
      }

      button,
      input {
        font: inherit;
      }

      select {
        font: inherit;
      }

      .mvp-splash {
        min-height: 100vh;
        display: grid;
        padding: 0;
        box-sizing: border-box;
        text-align: center;
        background: #faf6ec;
        cursor: pointer;
        overflow: hidden;
      }

      .mvp-splash-shell {
        width: 100%;
        max-width: none;
        cursor: pointer;
        border: 0;
        background: #faf6ec;
        box-shadow: none;
        overflow: hidden;
      }

      .mvp-splash-viewport {
        min-height: 100vh;
        display: grid;
        position: relative;
        place-items: center;
        align-items: center;
        justify-items: center;
        box-sizing: border-box;
        padding: 0;
        background: #faf6ec;
        overflow: hidden;
      }

      .mvp-splash-artwork {
        display: grid;
        justify-items: center;
        gap: 64px;
        width: min(62%, 258px);
        transform: translateY(-5vh);
        color: #151716;
        font-family: "Segoe Print", "Comic Sans MS", "Bradley Hand ITC", cursive;
        user-select: none;
      }

      .mvp-splash-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: clamp(12px, 4.2vw, 24px);
        line-height: 0.9;
        font-weight: 700;
        letter-spacing: 0;
      }

      .mvp-splash-logo-o {
        font-size: clamp(1.95rem, 10.2vw, 2.95rem);
        transform: rotate(-8deg) translateY(0.08em);
      }

      .mvp-splash-logo-v {
        font-size: clamp(1.52rem, 7.4vw, 2.1rem);
        transform: rotate(4deg) translateY(0.1em);
      }

      .mvp-splash-logo-big-o {
        font-size: clamp(2.6rem, 12.5vw, 3.8rem);
        transform: rotate(7deg);
      }

      .mvp-splash-tagline {
        display: grid;
        gap: 6px;
        margin: 0;
        color: #202524;
        font-size: clamp(0.9rem, 3.9vw, 1.12rem);
        font-weight: 700;
        line-height: 1.22;
        letter-spacing: 0;
      }

      .mvp-splash-tagline span {
        display: block;
      }

      .mvp-splash-tagline span:first-child {
        transform: translateX(-0.65em) rotate(-1deg);
      }

      .mvp-splash-tagline span:last-child {
        transform: translateX(0.8em) rotate(1deg);
      }

      .mvp-trial-entry {
        min-height: 100vh;
        display: grid;
        place-content: center;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
        background: #faf9f4;
      }

      .mvp-trial-entry-card {
        width: min(82vw, 330px);
        display: grid;
        justify-items: center;
        gap: 18px;
        padding: 36px 28px 32px;
        box-sizing: border-box;
        border: 1px solid rgba(153, 177, 181, 0.22);
        border-radius: 28px;
        background: rgba(255, 254, 250, 0.9);
        box-shadow: 0 18px 44px rgba(78, 100, 108, 0.08);
      }

      .mvp-trial-entry-brand {
        display: inline-grid;
        place-items: center;
        min-width: 78px;
        min-height: 42px;
        border-radius: 999px;
        background: rgba(204, 242, 242, 0.68);
        color: #1d3034;
        font-family: "Comic Sans MS", "Segoe Print", "Bradley Hand ITC", cursive;
        font-size: 1.16rem;
        font-weight: 700;
      }

      .mvp-trial-entry h1 {
        margin: 0;
        color: #1f292b;
        font-size: 1.5rem;
        letter-spacing: 0;
      }

      .mvp-trial-entry p {
        margin: 0;
        max-width: 240px;
        color: #657170;
        font-size: 0.94rem;
        line-height: 1.7;
      }

      .mvp-trial-entry-button {
        min-height: 44px;
        border: 1px solid rgba(132, 185, 196, 0.46);
        border-radius: 999px;
        padding: 10px 24px;
        background: #d9f2f4;
        color: #1e373d;
        cursor: pointer;
        font-weight: 700;
        box-shadow: 0 10px 24px rgba(73, 126, 138, 0.12);
      }

      .mvp-shell {
        min-height: 100vh;
        max-width: 430px;
        margin: 0 auto;
        border-right: 1px solid rgba(154, 190, 203, 0.2);
        border-left: 1px solid rgba(154, 190, 203, 0.2);
        background: #fbfaf3;
        box-shadow: 0 18px 58px rgba(78, 132, 157, 0.16);
      }

      .mvp-viewport {
        min-height: 100vh;
        padding: 12px 18px 86px;
        box-sizing: border-box;
        background: #fbfaf3;
      }

      .mvp-page {
        min-height: calc(100vh - 100px);
      }

      .mvp-page > .mvp-screen {
        min-height: inherit;
      }

      .mvp-screen {
        min-height: calc(100vh - 100px);
      }

      .mvp-header {
        min-height: 44px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .mvp-home-header {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) 44px;
        gap: 10px;
        align-items: center;
        min-height: 70px;
        margin-bottom: 8px;
      }

      .mvp-home-brand {
        grid-column: 2;
        justify-self: center;
        display: inline-grid;
        justify-items: center;
        align-items: center;
        gap: 3px;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }

      .mvp-home-brand h1 {
        margin: 0;
        color: #222b2d;
        font-size: 1.58rem;
        letter-spacing: 0;
        line-height: 1;
      }

      .mvp-home-wordmark {
        position: relative;
        display: inline-block;
        line-height: 1;
      }

      .mvp-notification-dot {
        position: absolute;
        top: -1px;
        right: -8px;
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #d8665c;
      }

      .mvp-world-linked-count {
        max-width: 180px;
        overflow: hidden;
        color: #758b8d;
        font-size: 0.74rem;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mvp-add-button {
        grid-column: 3;
        width: 36px;
        height: 36px;
        border: 1px solid #d4e7ec;
        border-radius: 999px;
        background: #edf8fa;
        color: #2b464c;
        cursor: pointer;
        font-size: 1.12rem;
        box-shadow: 0 6px 16px rgba(94, 143, 155, 0.1);
      }

      .mvp-header h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      .mvp-bottom-nav {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        max-width: 430px;
        margin: 0 auto;
        padding: 7px 16px 11px;
        box-sizing: border-box;
        border-top: 1px solid #e0eaec;
        background: rgba(251, 250, 243, 0.95);
        backdrop-filter: blur(16px);
      }

      .mvp-overlay-layer {
        position: fixed;
        right: 0;
        bottom: 124px;
        left: 0;
        z-index: 7;
        max-width: 430px;
        margin: 0 auto;
        padding: 0 16px;
        box-sizing: border-box;
        pointer-events: none;
      }

      .mvp-overlay-layer:empty {
        display: none;
      }

      .mvp-overlay-panel {
        display: grid;
        gap: 8px;
        max-height: min(42vh, 360px);
        overflow-y: auto;
        padding: 10px;
        border: 1px solid #e2e5e0;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 12px 30px rgba(31, 37, 40, 0.12);
        pointer-events: auto;
      }

      .mvp-world-creation-transition-layer {
        position: fixed;
        right: 0;
        top: 86px;
        left: 0;
        z-index: 8;
        max-width: 430px;
        margin: 0 auto;
        padding: 0 18px;
        box-sizing: border-box;
        pointer-events: none;
      }

      .mvp-world-creation-transition-layer:empty {
        display: none;
      }

      .mvp-world-creation-transition {
        display: grid;
        gap: 6px;
        padding: 14px;
        border: 1px solid #e2e5e0;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 12px 30px rgba(31, 37, 40, 0.12);
        pointer-events: auto;
      }

      .mvp-world-creation-transition p,
      .mvp-world-creation-transition strong {
        margin: 0;
      }

      .mvp-world-creation-transition button {
        justify-self: end;
        border: 0;
        border-radius: 999px;
        padding: 7px 14px;
        background: #111;
        color: #fff;
      }

      .mvp-add-menu,
      .mvp-chat-menu,
      .mvp-ovo-control,
      .mvp-ovo-world-menu,
      .mvp-file-picker {
        justify-self: end;
        width: min(220px, 100%);
      }

      .mvp-ovo-control,
      .mvp-ovo-world-menu {
        justify-self: center;
      }

      .mvp-create-world-draft {
        display: grid;
        align-content: start;
        gap: 14px;
        padding-bottom: 12px;
      }

      .mvp-create-world-draft input,
      .mvp-create-world-draft textarea,
      .mvp-create-world-detail-edit input,
      .mvp-create-world-detail-edit textarea,
      .mvp-world-editor input,
      .mvp-world-editor textarea {
        min-height: 40px;
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #d8ddd9;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }

      .mvp-create-world-draft textarea {
        min-height: 88px;
        resize: vertical;
      }

      .mvp-create-world-draft input.is-invalid,
      .mvp-create-world-detail-edit input.is-invalid {
        border-color: #d3382f;
        box-shadow: 0 0 0 2px rgba(211, 56, 47, 0.12);
      }

      .mvp-create-world-detail-edit textarea,
      .mvp-world-editor textarea {
        min-height: 96px;
        resize: vertical;
      }

      .mvp-world-editor {
        display: grid;
        align-content: start;
        gap: 14px;
      }

      .mvp-create-world-stage,
      .mvp-create-world-field,
      .mvp-create-world-worldview-block,
      .mvp-create-world-section,
      .mvp-create-world-actions,
      .mvp-create-world-detail-section,
      .mvp-world-editor-section,
      .mvp-world-editor-actions,
      .mvp-create-world-fixed-roles,
      .mvp-create-world-fixed-role-row,
      .mvp-create-world-random-roles,
      .mvp-create-world-random-role-row {
        display: grid;
        gap: 6px;
      }

      .mvp-create-world-stage h2 {
        margin: 0;
        font-size: 0.95rem;
      }

      .mvp-create-world-validation {
        margin: 0;
        color: #d3382f;
        font-size: 0.86rem;
      }

      .mvp-create-world-source-controls,
      .mvp-create-world-official-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .mvp-create-world-source-controls button,
      .mvp-create-world-chip {
        min-height: 34px;
        padding: 0 10px;
        border: 1px solid #d8ddd9;
        border-radius: 999px;
        background: #ffffff;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-create-world-chip {
        font-size: 0.9rem;
      }

      .mvp-create-world-detail-edit {
        display: grid;
        align-content: start;
        gap: 14px;
      }

      .mvp-create-world-detail-placeholder {
        display: grid;
        gap: 8px;
        padding: 14px;
        border: 1px solid #e2e5e0;
        border-radius: 10px;
        background: #ffffff;
      }

      .mvp-create-world-fixed-role-row,
      .mvp-create-world-random-role-row {
        padding: 10px;
        border: 1px solid #e2e5e0;
        border-radius: 10px;
        background: #ffffff;
      }

      .mvp-create-world-role-checkbox {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #4f5d58;
        font-size: 0.92rem;
      }

      .mvp-create-world-role-checkbox input {
        width: auto;
        min-height: auto;
      }

      .mvp-ovo-world-list {
        display: grid;
        gap: 6px;
      }

      .mvp-ovo-world-row.is-current {
        border-color: #d3382f;
        color: #d3382f;
        font-weight: 700;
      }

      .mvp-emoji-picker {
        grid-auto-flow: column;
        justify-content: start;
        width: max-content;
        max-width: 100%;
      }

      .mvp-overlay-panel button {
        min-height: 40px;
        border: 1px solid #d8ddd9;
        border-radius: 8px;
        background: #ffffff;
        color: #1f2528;
        cursor: pointer;
      }

      .mvp-nav-item {
        min-height: 42px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #738586;
        cursor: pointer;
      }

      .mvp-nav-item.is-active {
        background: #e8f5f7;
        color: #24383d;
        font-weight: 700;
      }

      .mvp-chat-list,
      .mvp-contact-list,
      .mvp-connected-list {
        display: grid;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .mvp-chat-list {
        gap: 0;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: transparent;
      }

      .mvp-chat-list li + li {
        border-top: 1px solid #e5edef;
      }

      .mvp-ovo-indicator {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin: 0 0 12px;
        padding: 8px 10px;
        border-radius: 999px;
        background: #eef4f1;
        color: #26322e;
        font-size: 0.92rem;
      }

      .mvp-chat-row,
      .mvp-contact-row {
        width: 100%;
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 12px 2px;
        border: 0;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .mvp-chat-row {
        gap: 12px;
        min-height: 68px;
        padding: 12px 0;
      }

      .mvp-contact-row {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .mvp-avatar {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        background: #e8f4f9;
        color: #26322e;
        font-weight: 800;
      }

      .mvp-chat-row .mvp-avatar {
        border-radius: 50%;
        background: #e6f4f7;
        color: #263b40;
      }

      .mvp-avatar-wrap {
        position: relative;
        display: inline-grid;
        width: 44px;
        height: 44px;
        place-items: center;
      }

      .mvp-avatar-wrap .mvp-presence-dot {
        position: absolute;
        right: 1px;
        bottom: 1px;
        border: 2px solid #fbfbf8;
      }

      .mvp-chat-copy {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .mvp-chat-kind {
        justify-self: start;
        border-radius: 999px;
        padding: 2px 7px;
        background: #eef4f1;
        color: #4f7d72;
        font-size: 0.72rem;
        font-style: normal;
        font-weight: 700;
      }

      .mvp-relationship-copy {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .mvp-chat-copy strong,
      .mvp-chat-copy span,
      .mvp-relationship-copy strong,
      .mvp-relationship-copy span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mvp-chat-copy strong {
        color: #202729;
        font-size: 0.98rem;
        font-weight: 700;
      }

      .mvp-chat-subtitle {
        color: #708789;
        font-size: 0.82rem;
      }

      .mvp-chat-copy span,
      .mvp-relationship-copy span {
        color: #68736f;
        font-size: 0.9rem;
      }

      .mvp-empty-state,
      .mvp-message-empty {
        margin: 16px 0;
        padding: 18px 14px;
        border: 1px solid #e2ecee;
        border-radius: 14px;
        background: rgba(255, 253, 247, 0.72);
        color: #708789;
        line-height: 1.45;
      }

      .mvp-avatar.is-system {
        background: #1f2528;
        color: #ffffff;
      }

      .mvp-name-block {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .mvp-name-block strong,
      .mvp-name-block span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mvp-name-block span {
        color: #68736f;
        font-size: 0.9rem;
      }

      .mvp-presence-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #b9c0bc;
      }

      .mvp-presence-dot.is-online {
        background: #4f7d72;
      }

      .mvp-chat-meta {
        display: grid;
        justify-items: end;
        gap: 6px;
        color: #91a0a1;
        font-size: 0.76rem;
      }

      .mvp-chat-meta strong {
        min-width: 17px;
        height: 17px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #d8665c;
        color: #ffffff;
        font-size: 0.72rem;
      }

      .mvp-chat-view {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: calc(100vh - 16px);
        padding-bottom: 106px;
        background: #fbfaf3;
      }

      .mvp-chat-page-header {
        min-height: 58px;
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) 40px;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
        border-bottom: 1px solid #e5edef;
      }

      .mvp-back-button {
        min-height: 34px;
        border: 0;
        background: transparent;
        color: #58787c;
        cursor: pointer;
        font-weight: 700;
      }

      .mvp-chat-title {
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
        justify-self: center;
      }

      .mvp-chat-title .mvp-avatar {
        border-radius: 50%;
        background: #e6f4f7;
      }

      .mvp-chat-title .mvp-name-block {
        max-width: 210px;
        gap: 2px;
        text-align: center;
      }

      .mvp-chat-title .mvp-name-block strong {
        color: #202729;
        font-size: 0.98rem;
      }

      .mvp-chat-title .mvp-name-block span {
        color: #7a8f91;
        font-size: 0.76rem;
      }

      .mvp-chat-menu-button {
        width: 36px;
        height: 36px;
        border: 1px solid #d4e7ec;
        border-radius: 999px;
        background: #edf8fa;
        color: #2b464c;
        cursor: pointer;
      }

      .mvp-message-stream {
        display: grid;
        grid-auto-flow: row;
        align-content: end;
        gap: 10px;
        margin: 0;
        padding: 12px 0 26px;
        overflow-y: auto;
        overscroll-behavior: contain;
        list-style: none;
      }

      .mvp-message-row {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        align-items: end;
        gap: 9px;
      }

      .mvp-message-row.is-mine {
        grid-template-columns: minmax(0, 1fr) 44px;
      }

      .mvp-message-row .mvp-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #e6f4f7;
        color: #263b40;
        font-size: 0.9rem;
      }

      .mvp-message-row .mvp-avatar-wrap {
        width: 38px;
        height: 38px;
      }

      .mvp-message {
        max-width: min(78%, 286px);
        justify-self: start;
        margin: 0;
        padding: 10px 12px;
        border: 1px solid #edf0ec;
        border-radius: 16px 16px 16px 6px;
        background: #fffdf7;
        color: #202729;
        line-height: 1.5;
        box-shadow: 0 4px 14px rgba(84, 120, 130, 0.06);
      }

      .mvp-message-block {
        min-width: 0;
        display: grid;
        gap: 5px;
        justify-items: start;
      }

      .mvp-message-speaker {
        color: #668082;
        font-size: 0.76rem;
        font-weight: 700;
      }

      .mvp-message.is-error {
        border: 1px solid #f0cfca;
        background: #fff8f5;
        color: #97483f;
        box-shadow: none;
      }

      .mvp-message.is-loading {
        border-color: #dbeaec;
        background: #eef8f9;
        color: #5f7c80;
        font-style: italic;
        box-shadow: none;
      }

      .mvp-message-row.is-mine .mvp-message {
        justify-self: end;
        border-color: #cfe9ef;
        border-radius: 16px 16px 6px 16px;
        background: #dff3f6;
        color: #1d353b;
      }

      .mvp-message-row.is-mine .mvp-message-block {
        justify-items: end;
      }

      .mvp-composer {
        position: fixed;
        right: 0;
        bottom: 64px;
        left: 0;
        z-index: 6;
        max-width: 430px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        padding: 9px 18px 11px;
        box-sizing: border-box;
